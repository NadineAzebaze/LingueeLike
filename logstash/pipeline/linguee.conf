# =============================================================================
# linguee.conf — Pipeline Logstash : CSV aligné → documents paires OpenSearch
#
# Chaque ligne CSV (en, fr) devient UN document OpenSearch contenant les deux
# textes. L'index est recréé via le template avant chaque chargement.
#
# Exécution :
#   docker compose run --rm logstash
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT — lecture unique du fichier CSV (mode "read" : Logstash quitte ensuite)
# -----------------------------------------------------------------------------
input {
  file {
    path           => "/data/aligned_book.csv"
    start_position => "beginning"
    sincedb_path   => "/dev/null"   # relit depuis le début à chaque exécution
    codec          => plain { charset => "UTF-8" }
    mode           => "read"        # traitement one-shot, pas de tail continu
  }
}

# -----------------------------------------------------------------------------
# FILTER — transformation CSV → document paire bilingue
# -----------------------------------------------------------------------------
filter {

  # 1. Supprimer la ligne d'en-tête
  if [message] =~ /^en,fr/ {
    drop {}
  }

  # 2. Parser les deux colonnes (gère les guillemets et virgules internes)
  csv {
    columns    => ["text_en", "text_fr"]
    separator  => ","
    quote_char => '"'
  }

  # 3. Supprimer les lignes vides ou incomplètes
  if ![text_en] or [text_en] =~ /^\s*$/ {
    drop {}
  }

  # 4. Calculer les identifiants séquentiels
  #    IMPORTANT : requiert pipeline.workers: 1 (variable globale Ruby)
  ruby {
    code => '
      $pair_id ||= 0
      $pair_id += 1
      event.set("pair_id",       $pair_id)
      event.set("position",      $pair_id)
      event.set("segment_id_en", $pair_id * 2 - 1)
      event.set("segment_id_fr", $pair_id * 2)
      event.set("book_id",       1)
      event.set("book_title",    "Thirty-six reasons for winning the lost")
    '
  }

  # 5. Nettoyer les champs internes Logstash
  mutate {
    remove_field => ["message", "@version", "@timestamp", "host", "log", "event"]
  }
}

# -----------------------------------------------------------------------------
# OUTPUT — indexation dans OpenSearch
# -----------------------------------------------------------------------------
output {
  opensearch {
    hosts              => ["http://opensearch:9200"]
    index              => "segments"
    document_id        => "pair-%{pair_id}"
    action             => "index"

    # Création/mise à jour automatique du mapping avant le chargement
    manage_template    => true
    template           => "/usr/share/logstash/templates/segments.json"
    template_name      => "segments"
    template_overwrite => true
  }

  # Affiche un point par batch pour suivre la progression
  stdout { codec => dots }
}
