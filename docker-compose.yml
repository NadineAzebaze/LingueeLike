services:

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: linguee-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  logstash:
    # Image OpenSearch officielle : inclut le plugin logstash-output-opensearch
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: linguee-logstash
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/templates:/usr/share/logstash/templates:ro
      - ./data/books:/data:ro        # CSV source monté en lecture seule
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    restart: "no"                    # conteneur one-shot : quitte après indexation

volumes:
  opensearch-data:
